spring.application.name=genaichatmemory
# Ollama provider configuration
spring.ai.ollama.host=localhost
spring.ai.ollama.port=11434
spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.api-key=
spring.ai.ollama.timeout=30s
spring.ai.ollama.chat.model=llama3.2:1b
 ##llama3.2:1b

#Google Gemini provider configuration
spring.ai.google.genai.base-url=https://generativelanguage.googleapis.com/v1beta2
spring.ai.google.genai.api-key=api-key
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
#Jdb provider configuration
spring.ai.chat.memory.repository.jdbc.initialize-schema=ALWAYS
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/javatechie
spring.datasource.username=root
spring.datasource.password=Password